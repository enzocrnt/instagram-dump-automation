<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Photo Dump Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="/eel.js"></script>
    <style>
        .offcanvas { background-color: #121212; border-left: 1px solid #262626; width: 360px !important; }
        .modal-content { background-color: #121212; border: 1px solid #262626; }
        
        /* Loading overlay positioning */
        .deck-wrapper {
            position: relative;
        }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(4px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body class="bg-black text-white">

    <!-- Responsive Top Navigation Branding Bar -->
    <nav class="navbar navbar-dark border-bottom border-secondary sticky-top px-3 d-flex align-items-center justify-content-between" style="background-color: #000000; height: 56px;">
        <span class="navbar-brand mb-0 h1 fw-bold tracking-wide text-truncate" style="font-size: 1.1rem; max-width: 70%;">
            CREATOR STUDIO <span class="text-white-50 fw-light d-none d-sm-inline">| Pipeline V2.2</span>
        </span>
        <button class="btn btn-outline-secondary btn-sm fw-bold px-3" style="height: 31px;" type="button" data-bs-toggle="modal" data-bs-target="#pathConfigModal">
            Settings
        </button>
    </nav>

    <!-- Main Dashboard Workspace Frame -->
    <div class="container-fluid py-4 px-4">
        
        <!-- Drive Status Warning Banner -->
        <div id="driveWarningBanner" class="alert alert-danger d-none border-danger mb-4" role="alert" style="background-color: #1a080a; color: #ff8080;">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <strong>Target Path Disconnected:</strong> The selected Source Media Location Directory cannot be found. Please check your external hard drive connection or update paths in Settings.
                </div>
                <button class="btn btn-sm btn-outline-danger fw-bold" onclick="verifyActiveDriveStatus()">Re-scan Hardware</button>
            </div>
        </div>

        <div class="row g-4">
            
            <!-- Left Panel: Interactive Curation Deck -->
            <div class="col-lg-7 col-12">
                <div class="control-card p-4 h-100">
                    <h5 class="mb-4 text-white fw-bold tracking-sm">CURATION DECK</h5>
                    
                    <!-- Chronological Timeline Selectors -->
                    <div class="row g-2 align-items-center mb-4">
                        <div class="col-auto">
                            <button class="btn btn-outline-secondary fw-bold" id="btnPrevDate">◀</button>
                        </div>
                        <div class="col">
                            <select id="yearSelect" class="form-select custom-input text-white">
                                <option value="2020">2020</option>
                                <option value="2021">2021</option>
                                <option value="2022">2022</option>
                                <option value="2023">2023</option>
                                <option value="2024" selected>2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                                <option value="2028">2028</option>
                            </select>
                        </div>
                        <div class="col">
                            <select id="monthSelect" class="form-select custom-input text-white">
                                <option value="January">January</option><option value="February">February</option>
                                <option value="March">March</option><option value="April">April</option>
                                <option value="May">May</option><option value="June">June</option>
                                <option value="July">July</option><option value="August">August</option>
                                <option value="September">September</option><option value="October">October</option>
                                <option value="November">November</option><option value="December">December</option>
                            </select>
                        </div>
                        <div class="col">
                            <select id="daySelect" class="form-select custom-input text-white"></select>
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-outline-secondary fw-bold" id="btnNextDate">▶</button>
                        </div>
                    </div>

                    <!-- Gallery Interaction Grid Container with Overlay Layer -->
                    <div class="deck-wrapper">
                        <!-- Loading Spinner Overlay -->
                        <div id="deckLoadingOverlay" class="loading-overlay d-none">
                            <div class="spinner-border text-primary mb-3" role="status"></div>
                            <span class="small text-white-50 fw-bold tracking-wide">SCANNING DIRECTORIES...</span>
                        </div>
                        
                        <div class="gallery-wrapper rounded p-3 mb-4" style="background-color: #050505; min-height: 420px;">
                            <div id="galleryContainer" class="d-flex flex-wrap gap-2 justify-content-start"></div>
                        </div>
                    </div>

                    <!-- Layout Action Controls -->
                    <div class="d-flex gap-3">
                        <button id="btnReroll" class="btn btn-secondary w-50 fw-bold py-2">Reroll</button>
                        <button id="btnSave" class="btn btn-primary w-50 fw-bold py-2 ig-btn-primary">Save to Standby</button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Permanent Standby Deployment Queue -->
            <div class="col-lg-5 col-12">
                <div class="control-card p-4 h-100">
                    <h5 class="mb-4 text-white fw-bold tracking-sm">STANDBY PIPELINE QUEUE</h5>
                    <div id="queueContainer" class="overflow-y-auto" style="max-height: 580px; padding-right: 4px;">
                        <!-- Staged cards inject here -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Centered Configuration Modal Container -->
    <div class="modal fade" id="pathConfigModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-white">
                <div class="modal-header border-bottom border-secondary">
                    <h6 class="modal-title fw-bold">Pipeline Settings</h6>
                    <button type="button" class="btn-close btn-close-white btn-sm" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body d-flex flex-column gap-3">
                    <div>
                        <label class="form-label text-white-50 small fw-bold">Source Media Location Directory:</label>
                        <div class="input-group input-group-sm">
                            <input type="text" id="cfgSourcePath" class="form-control custom-input text-white" readonly placeholder="Select source folder...">
                            <button class="btn btn-outline-secondary fw-bold" type="button" id="btnBrowseSource">Browse</button>
                        </div>
                    </div>
                    <div>
                        <label class="form-label text-white-50 small fw-bold">Staging Folder Vault Destination:</label>
                        <div class="input-group input-group-sm">
                            <input type="text" id="cfgVaultPath" class="form-control custom-input text-white" readonly placeholder="Select staging folder...">
                            <button class="btn btn-outline-secondary fw-bold" type="button" id="btnBrowseVault">Browse</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top border-secondary">
                    <button id="btnSaveConfig" class="btn btn-outline-primary btn-sm w-100 fw-bold py-1" style="height: 31px;" data-bs-dismiss="modal">Save Paths</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
