<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Photo Dump Pipeline</title>
    <!-- Bootstrap 5 Dark Utilities CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid h-100">
        <div class="row h-100">
            
            <!-- LEFT PANEL: CURATION DECK -->
            <div class="col-md-5 panel-border p-4 d-flex flex-column justify-content-between h-100">
                <div class="overflow-auto pe-1" style="flex-grow: 1;">
                    <h5 class="text-uppercase tracking-wider mb-3">Phase 1: Curation Deck</h5>
                    
                    <!-- Date Pickers Row -->
                    <div class="row g-2 mb-4">
                        <div class="col-7">
                            <label class="form-label small">Month</label>
                            <select id="monthSelect" class="form-select ig-input">
                                <option value="January" selected>January</option>
                                <option value="February">February</option>
                                <option value="March">March</option>
                                <option value="April">April</option>
                                <option value="May">May</option>
                                <option value="June">June</option>
                                <option value="July">July</option>
                                <option value="August">August</option>
                                <option value="September">September</option>
                                <option value="October">October</option>
                                <option value="November">November</option>
                                <option value="December">December</option>
                            </select>
                        </div>
                        <div class="col-5">
                            <label class="form-label small">Day</label>
                            <select id="daySelect" class="form-select ig-input"></select>
                        </div>
                    </div>

                    <!-- Instagram Mock Post Preview Card -->
                    <label class="form-label small mb-2">Carousel Preview (Max 10 Items)</label>
                    <div class="ig-post-card mx-auto">
                        <div class="ig-post-header d-flex align-items-center p-2">
                            <div class="rounded-circle mock-avatar me-2"></div>
                            <span class="fw-semibold small text-white">enzocrnt</span>
                        </div>
                        <div id="galleryContainer" class="ig-post-body d-flex flex-wrap p-2 justify-content-start align-content-start">
                            <!-- JS will inject thumbnails dynamically here -->
                        </div>
                    </div>
                </div>

                <!-- Action Footers (Now locked at the base securely) -->
                <div class="d-flex gap-2 pt-3 bg-card-dark border-top-divider">
                    <button id="btnReroll" class="btn btn-secondary w-50 ig-btn-secondary">Reroll Day Pool</button>
                    <button id="btnSave" class="btn btn-primary w-50 ig-btn-primary">Save to Standby</button>
                </div>
            </div>

            <!-- RIGHT PANEL: STANDBY QUEUE -->
            <div class="col-md-7 p-4 d-flex flex-column h-100">
                <h5 class="text-uppercase tracking-wider mb-3">Phase 2 & 3: Standby Queue</h5>
                <div id="queueContainer" class="flex-grow-1 overflow-auto pe-2">
                    <!-- JS will inject pending post items here -->
                </div>
            </div>

        </div>
    </div>

    <!-- Include Eel connection scripts -->
    <script type="text/javascript" src="/eel.js"></script>
    <script src="script.js"></script>
</body>
</html>
